# ============================================
# 弱电工程管理平台 - Docker Compose 配置
# ============================================

version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weak-platform
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # 数据持久化
      - ./data:/data
      # 配置文件（可选，用于热更新配置）
      - ./config:/app/config:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/data.db
      # 安全配置 - 生产环境请修改这些值
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-random-secret-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-this-to-a-random-key-32bytes}
      # 邮件配置（可选）
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      # CORS 配置
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 资源限制（可选）
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

# 数据卷定义
volumes:
  data:
    driver: local
